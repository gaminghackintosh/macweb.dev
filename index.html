  <!-- GLOBAL RESET -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    * { -webkit-tap-highlight-color: transparent; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
    }

    #root {
      opacity: 0;
      animation: fadeIn 0.4s ease 0.1s forwards;
    }

    @keyframes fadeIn {

<body>
  <div id="root"></div>

  <!-- Noscript fallback -->
  <noscript>
    <style>
      #root {
        display: none;
      }

      .noscript-screen {
        position: fixed;
        inset: 0;
        overflow: hidden;

        display: flex;
        align-items: center;
        justify-content: center;

        background:
          radial-gradient(circle at top, rgba(88, 28, 135, 0.35), transparent 40%),
          radial-gradient(circle at bottom, rgba(37, 99, 235, 0.25), transparent 45%),
          linear-gradient(180deg, #0b0713 0%, #120d1f 100%);

        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          "SF Pro Display",
          sans-serif;

        color: white;
      }

      .noscript-blur {
        position: absolute;
        inset: 0;
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
      }

      .noscript-window {
        position: relative;
        z-index: 2;

        width: min(520px, calc(100% - 32px));

        border-radius: 22px;

        background: rgba(30, 30, 40, 0.55);

        border: 1px solid rgba(255,255,255,0.08);

        box-shadow:
          0 30px 80px rgba(0,0,0,0.55),
          inset 0 1px 0 rgba(255,255,255,0.05);

        overflow: hidden;

        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
      }

      .noscript-toolbar {
        height: 42px;

        display: flex;
        align-items: center;

        padding: 0 16px;

        background: rgba(255,255,255,0.03);

        border-bottom: 1px solid rgba(255,255,255,0.06);
      }

      .traffic-lights {
        display: flex;
        gap: 8px;
      }

      .traffic-lights span {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        display: block;
      }

      .traffic-lights span:nth-child(1) {
        background: #ff5f57;
      }

      .traffic-lights span:nth-child(2) {
        background: #febc2e;
      }

      .traffic-lights span:nth-child(3) {
        background: #28c840;
      }

      .noscript-content {
        padding: 42px 34px 38px;
        text-align: center;
      }

      .noscript-logo {
        font-size: 64px;
        line-height: 1;
        margin-bottom: 18px;

        filter: drop-shadow(0 0 18px rgba(255,255,255,0.08));
      }

      .noscript-title {
        font-size: 32px;
        font-weight: 700;
        letter-spacing: -0.03em;

        margin-bottom: 12px;
      }

      .noscript-subtitle {
        font-size: 15px;
        line-height: 1.7;

        color: rgba(255,255,255,0.72);

        margin-bottom: 28px;
      }

      .noscript-badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;

        padding: 12px 18px;

        border-radius: 14px;

        background: rgba(255,255,255,0.05);

        border: 1px solid rgba(255,255,255,0.06);

        font-size: 14px;
        color: rgba(255,255,255,0.88);
      }

      .noscript-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;

        background: #ff453a;

        box-shadow:
          0 0 10px rgba(255,69,58,0.8),
          0 0 24px rgba(255,69,58,0.45);
      }

      .noscript-footer {
        margin-top: 30px;

        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;

        color: rgba(255,255,255,0.32);
      }

      @media (max-width: 640px) {
        .noscript-content {
          padding: 34px 24px 30px;
        }

        .noscript-title {
          font-size: 26px;
        }

        .noscript-subtitle {
          font-size: 14px;
        }
      }
    </style>

    <div class="noscript-screen">
      <div class="noscript-blur"></div>

      <div class="noscript-window">
        <div class="noscript-toolbar">
          <div class="traffic-lights">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>

        <div class="noscript-content">
          <div class="noscript-logo">🍎</div>

          <div class="noscript-title">
            JavaScript Required
          </div>

          <div class="noscript-subtitle">
            hackintosh.web simulates an entire macOS-like desktop environment
            directly inside your browser.<br /><br />

            Unfortunately, your browser currently has JavaScript disabled,
            so the operating system failed to boot.
          </div>

          <div class="noscript-badge">
            <div class="noscript-dot"></div>
            System halted — JavaScript unavailable
          </div>

          <div class="noscript-footer">
            hackintosh.web
          </div>
        </div>
      </div>
    </div>
  </noscript>

</body>
</html>
